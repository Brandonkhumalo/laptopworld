[build]
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "python manage.py migrate --noinput && python -c 'import config.wsgi; print(\"WSGI OK\")' && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 30 --access-logfile - --error-logfile - --log-level debug"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = ""
